name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy-backend:
    name: Deploy Backend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Rsync Backend
        run: |
          rsync -avzr --delete \
            --exclude='.env' \
            --exclude='node_modules/' \
            --exclude='uploads/' \
            --exclude='*.db' \
            --exclude='*.db-shm' \
            --exclude='*.db-wal' \
            -e "ssh -i ~/.ssh/deploy_key" \
            Backend-File/ ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/var/www/brother-backend/

      - name: Install & Restart Backend
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /var/www/brother-backend
            npm install --omit=dev
            pm2 restart brother-backend

  deploy-frontend:
    name: Build & Deploy Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: Frontend-File
        run: npm install

      - name: Build
        working-directory: Frontend-File
        run: npm run build

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Rsync Frontend
        run: |
          rsync -avzr --delete \
            -e "ssh -i ~/.ssh/deploy_key" \
            Frontend-File/dist/ ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/var/www/beta/
